<!DOCTYPE html>
<html>
<head>
    <title>ControlGastos</title>
</head>
<body>

    <h1>ControlGastos</h1>

    <h2>Registrar gasto</h2>

    <input type="number" id="monto" placeholder="Monto">
    <input type="text" id="descripcion" placeholder="Descripción">
    <input type="date" id="fecha">

    <button onclick="guardarGasto()">Guardar</button>

    <h2>Lista de gastos</h2>
    <ul id="lista"></ul>


    <script>
    async function guardarGasto() {
        const monto = document.getElementById("monto").value;
        const descripcion = document.getElementById("descripcion").value;
        const fecha = document.getElementById("fecha").value;

        await fetch("http://localhost:3000/movimientos", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                tipo: "gasto",
                monto,
                descripcion,
                fecha
            })
        });

        cargarGastos();
    }

    async function cargarGastos() {
        const res = await fetch("http://localhost:3000/movimientos");
        const data = await res.json();

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        data.forEach(gasto => {
            const li = document.createElement("li");
            li.textContent = gasto.descripcion + " - Q" + gasto.monto;
            lista.appendChild(li);
        });
    }

    cargarGastos();
    </script>

</body>
</html>
